name: Deploy to Cloudflare Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "0.152.2"
          extended: true

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Patch theme for Hugo compatibility
        run: find themes/hugo-brewm/layouts -type f -exec perl -i -pe '
          s/site\.Language\.Locale/site.LanguageCode/g;
          s/\.Language\.Locale/\.Language\.LanguageCode/g;
          s/site\.Language\.Label/site.Language.LanguageName/g;
          s/\.Language\.Label/\.Language\.LanguageName/g;
          s/site\.Language\.Direction/"ltr"/g;
          s/\.Language\.Direction/"ltr"/g;
          s/site\.Language\.LanguageDirection/"ltr"/g;
        ' {} +

      - name: Build
        run: npm run build

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy public --project-name=time-friend
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
